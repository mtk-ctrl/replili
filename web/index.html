<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Capture the Flag - City Prototype</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #111; }
      #renderCanvas { width: 100%; height: 100%; display: block; touch-action: none; }
      #controls {
        position: fixed;
        left: 12px;
        bottom: 12px;
        padding: 8px 12px;
        font: 13px/1.5 system-ui, sans-serif;
        color: #fff;
        background: rgba(0, 0, 0, 0.45);
        border-radius: 8px;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="controls">WASD: 移動 ・ Shift: ダッシュ ・ Space: ジャンプ ・ E: ドア開閉 ・ マウス: 視点</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
